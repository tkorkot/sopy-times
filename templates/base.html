<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LithoLearn{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body class="bg-[#07111f] min-h-screen text-gray-800">

  <!-- Nav -->
  <nav class="bg-[#07111f] border-b border-slate-800 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <a href="/" class="font-bold tracking-[0.12em] text-white text-lg">
        LithoLearn
      </a>

      <div class="flex items-center gap-8">
        <a href="/dashboard" class="text-sm font-semibold text-slate-300 hover:text-white uppercase tracking-[0.12em]">
          Dashboard
        </a>
        <a href="/documents" class="text-sm font-semibold text-slate-300 hover:text-white uppercase tracking-[0.12em]">
          All SOPs
        </a>
      </div>
    </div>
  </nav>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="max-w-4xl mx-auto mt-4 px-4">
        {% for category, message in messages %}
          <div class="p-3 rounded text-sm mb-2
            {% if category == 'error' %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <!-- Page content -->
  <main class="{% block main_class %}max-w-5xl mx-auto px-4 py-8{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
