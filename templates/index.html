{% extends "base.html" %}
{% block title %}SOP Hub — Get Started{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto mt-12">
  <h1 class="text-3xl font-bold text-gray-900 mb-2">Find Your SOPs</h1>
  <p class="text-gray-500 mb-8">Tell us about your role and we'll surface the most relevant standard operating procedures for you.</p>

  <form id="profileForm" class="bg-white rounded-xl shadow p-6 space-y-5">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Job Title</label>
      <input id="jobTitle" type="text" placeholder="e.g. Process Engineer, Lab Technician"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Experience Level</label>
      <select id="experienceLevel"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="beginner">Beginner (0–1 years)</option>
        <option value="intermediate" selected>Intermediate (1–3 years)</option>
        <option value="advanced">Advanced (3–7 years)</option>
        <option value="expert">Expert (7+ years)</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Area of Interest</label>
      <input id="areaOfInterest" type="text" placeholder="e.g. Plasma Cleaning, Soldering, Material Handling"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <button type="submit"
      class="w-full bg-blue-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-blue-700 transition">
      Find Relevant SOPs →
    </button>

  </form>

  <p id="loadingMsg" class="hidden text-center text-sm text-gray-500 mt-4">Analyzing SOPs for your profile…</p>
  <p id="errorMsg" class="hidden text-center text-sm text-red-500 mt-4"></p>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% endblock %}
